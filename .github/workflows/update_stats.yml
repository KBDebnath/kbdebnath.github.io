name: Update Academic Metrics

on:
  push:
    paths:
      - 'metrics.json'   # Runs automatically when you update the numbers
  workflow_dispatch:      # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4      # Fixed warning (v4)

      - name: Set up Python
        uses: actions/setup-python@v5  # Fixed warning (v5)
        with:
          python-version: '3.11'

      - name: Run update script
        run: python update_metrics.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add publications.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Sync HTML with metrics.json" && git push)

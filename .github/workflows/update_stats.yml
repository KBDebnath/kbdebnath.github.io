name: Update Academic Metrics

on:
  push:
    paths:
      - 'metrics.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # This stops the deprecation warnings
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run update script
        run: python update_metrics.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add publications.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update HTML metrics from JSON" && git push)
